<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Circuit Panic - Schematic Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--tg-theme-bg-color, #050510);
            color: var(--tg-theme-text-color, #fff);
            font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: var(--tg-viewport-height, 100vh); padding: 10px; overflow: hidden;
        }

        .glass-container {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            width: 100%; max-width: 500px; height: 95%;
            display: flex; flex-direction: column; padding: 15px 20px; position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; margin-bottom: 10px; color: #0ff; text-shadow: 0 0 10px #0ff; }
        .timer-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .timer-bar { height: 100%; width: 100%; background: #0f0; transition: width 0.1s linear, background-color 0.3s; box-shadow: 0 0 10px #0f0; }

        .question-box {
            background: rgba(0, 0, 0, 0.6); border: 1px solid #ff007f; border-radius: 10px; padding: 10px;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 15px; box-shadow: inset 0 0 20px rgba(255, 0, 127, 0.2); text-align: center; overflow: hidden;
        }

        .puzzle-type { font-size: 0.9rem; color: #ff007f; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .diagram { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Schematic Canvas */
        canvas { max-width: 100%; height: auto; background: rgba(255, 255, 255, 0.02); border-radius: 8px; margin-bottom: 10px;}

        /* KaTeX Customization */
        .katex { font-size: 1.6rem !important; color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); }
        .katex-display { margin: 0 !important; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .options-grid.full { grid-template-columns: 1fr; }

        button.option-btn {
            background: rgba(0, 255, 255, 0.05); border: 2px solid #0ff; color: #0ff;
            padding: 10px 5px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.1s; font-weight: bold;
            display: flex; justify-content: center; align-items: center; min-height: 50px;
        }
        button.option-btn .katex { font-size: 1.1rem !important; color: #0ff; text-shadow: none; }
        button.option-btn:active { background: rgba(0, 255, 255, 0.4); transform: scale(0.95); }

        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5, 5, 16, 0.95); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; text-align: center; }
        .overlay h1 { color: #f00; text-shadow: 0 0 20px #f00; font-size: 2.2rem; margin-bottom: 10px; }
        .settings-box { background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 10px; padding: 15px; width: 100%; margin-bottom: 20px; }
        .mode-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; background: transparent; border: 1px solid #aaa; color: #aaa; border-radius: 8px; font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: rgba(0, 255, 255, 0.2); border-color: #0ff; color: #0ff; box-shadow: 0 0 10px #0ff; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; color: #ccc; }
        .input-group input { background: rgba(0, 0, 0, 0.5); border: 1px solid #0ff; color: #0ff; padding: 5px 10px; border-radius: 5px; width: 70px; text-align: center; font-family: 'Orbitron', sans-serif; font-weight: bold; }
        .start-btn, .restart-btn { background: #ff007f; color: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; border-radius: 10px; box-shadow: 0 0 20px #ff007f; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="glass-container">
    <div id="start-screen" class="overlay">
        <h1 style="color: #0ff; text-shadow: 0 0 20px #0ff;">MIND MATRIX</h1>
        <div class="settings-box">
            <div class="mode-buttons">
                <button id="btn-timer" class="mode-btn active" onclick="setMode('timer')">TIMER</button>
                <button id="btn-relax" class="mode-btn" onclick="setMode('relax')">RELAXED</button>
            </div>
            <div id="timer-config">
                <div class="input-group"><label>Max Time (sec):</label><input type="number" id="input-max" value="20" min="5" max="60"></div>
                <div class="input-group"><label>Min Time (sec):</label><input type="number" id="input-min" value="13" min="2" max="30"></div>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1>SYSTEM FAILURE</h1>
        <h2 id="final-score">Score: 0</h2>
        <button class="restart-btn" onclick="showStartScreen()">REBOOT SYSTEM</button>
    </div>

    <div class="header">
        <span>SCORE: <span id="score">0</span></span>
        <span id="min-time-display" style="font-size:0.9rem; color:#aaa;">MIN: 13s</span>
    </div>

    <div class="timer-container" id="timer-ui"><div id="timer-bar" class="timer-bar"></div></div>
    <div class="question-box"><div id="puzzle-type" class="puzzle-type">LOADING...</div><div id="diagram" class="diagram"></div></div>
    <div id="options" class="options-grid"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); tg.ready();

    let score = 0; let timerInterval; let correctAnswer = null;
    let isTimerMode = true; let baseMaxTime = 20000, baseMinTime = 13000, timeLeft = baseMaxTime;
    let solvedPuzzles = new Set(); 

    function setMode(mode) {
        tg.HapticFeedback.impactOccurred('light');
        isTimerMode = (mode === 'timer');
        document.getElementById('btn-timer').classList.toggle('active', isTimerMode);
        document.getElementById('btn-relax').classList.toggle('active', !isTimerMode);
        document.getElementById('timer-config').style.display = isTimerMode ? 'block' : 'none';
    }

    function showStartScreen() {
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    // --- MATH GENERATORS WITH KaTeX ---
    function generateAdvancedCalculus() {
        const vars = ['x', 't', '\\theta'];
        const v = vars[Math.floor(Math.random() * vars.length)];
        const types = ['diff_chain', 'diff_prod', 'int_sub', 'int_def'];
        const type = types[Math.floor(Math.random() * types.length)];

        let q, a, wrong = [];
        let a_val = Math.floor(Math.random() * 5) + 2; 
        let b_val = Math.floor(Math.random() * 5) + 2;

        if (type === 'diff_chain') {
            q = `\\frac{d}{d${v}} \\left[ \\ln(${a_val}${v}^2 + ${b_val}) \\right]`;
            a = `\\frac{${2 * a_val}${v}}{${a_val}${v}^2 + ${b_val}}`;
            wrong = [`\\frac{1}{${a_val}${v}^2 + ${b_val}}`, `\\frac{${a_val}${v}}{${a_val}${v}^2 + ${b_val}}`, `\\frac{${2 * a_val}${v}}{\\ln(${a_val}${v}^2 + ${b_val})}`];
        } else if (type === 'diff_prod') {
            let n = Math.floor(Math.random() * 3) + 2; 
            q = `\\frac{d}{d${v}} \\left[ ${v}^{${n}} e^{${a_val}${v}} \\right]`;
            a = `${v}^{${n-1}} e^{${a_val}${v}} (${n} + ${a_val}${v})`;
            wrong = [`${v}^{${n}} e^{${a_val}${v}} (${n} + ${a_val}${v})`, `${n}${v}^{${n-1}} e^{${a_val}${v}}`, `${v}^{${n-1}} e^{${a_val}${v}} (${n}${v} + ${a_val})`];
        } else if (type === 'int_sub') {
            let coeff = 2 * a_val;
            q = `\\int ${coeff}${v} \\cos(${a_val}${v}^2) d${v}`;
            a = `\\sin(${a_val}${v}^2) + C`;
            wrong = [`-\\sin(${a_val}${v}^2) + C`, `${coeff} \\sin(${a_val}${v}^2) + C`, `\\cos(${a_val}${v}^2) + C`];
        } else {
            q = `\\int_{0}^{1} ${a_val * b_val} e^{${b_val}${v}} d${v}`;
            a = `${a_val}(e^{${b_val}} - 1)`;
            wrong = [`${a_val}e^{${b_val}}`, `${a_val * b_val}(e^{${b_val}} - 1)`, `${b_val}(e^{${a_val}} - 1)`];
        }
        correctAnswer = a;
        return { type: "Advanced Calculus", id: `Calc_${q}_${Math.random()}`, diagram: q, options: [a, ...wrong].sort(()=>Math.random()-0.5), isLatex: true, layout: 'grid' };
    }

    function generateAdvancedBoolean() {
        const templates = [
            { q: `(A + B)' + (A'B)'`, a: `1`, w: [`A'`, `B'`, `A'B`] },
            { q: `A(A + B) + B(B + C)`, a: `A + B`, w: [`A + BC`, `AB + BC`, `B + C`] },
            { q: `(X + Y)(X' + Z)(Y + Z)`, a: `(X + Y)(X' + Z)`, w: [`(X+Z)(Y+Z)`, `X'Y + XZ`, `XYZ`] }
        ];
        let p = templates[Math.floor(Math.random() * templates.length)];
        let v1 = Math.random() > 0.5 ? 'P' : 'X'; let v2 = Math.random() > 0.5 ? 'Q' : 'Y'; let v3 = Math.random() > 0.5 ? 'R' : 'Z';
        let q_str = "F = " + p.q.replace(/A/g, v1).replace(/B/g, v2).replace(/C/g, v3);
        let a_str = p.a.replace(/A/g, v1).replace(/B/g, v2).replace(/C/g, v3);
        let w_strs = p.w.map(w => w.replace(/A/g, v1).replace(/B/g, v2).replace(/C/g, v3));
        correctAnswer = a_str;
        return { type: "Boolean Theorem", id: `Bool_${q_str}_${Math.random()}`, diagram: q_str, options: [a_str, ...w_strs].sort(()=>Math.random()-0.5), isLatex: true, layout: 'grid' };
    }

    // --- HTML5 CANVAS SCHEMATIC GENERATOR ---
    function generateSchematicCircuit() {
        const s1 = Math.random() > 0.5; // Series switch (Main)
        const s2 = Math.random() > 0.5; // Parallel switch (Short circuit path)
        
        // Engineering Logic: 
        // If s1 is open, no current flows (OFF).
        // If s1 is closed AND s2 is closed, current takes the short circuit path, bypassing the bulb (OFF).
        // If s1 is closed AND s2 is open, current flows through the bulb (ON).
        const isOn = s1 && !s2;
        correctAnswer = isOn ? "ON" : "OFF";
        
        const canvasHtml = `
            <div style="font-family:'Fira Code'; color:#aaa; font-size:0.9rem; margin-bottom:5px;">Find Bulb State:</div>
            <canvas id="circuitCanvas" width="300" height="200"></canvas>
        `;

        const renderCanvas = () => {
            const canvas = document.getElementById('circuitCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // Neon Style
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Left Wire & DC Source
            ctx.beginPath(); ctx.moveTo(40, 50); ctx.lineTo(40, 80); ctx.stroke();
            ctx.beginPath(); ctx.arc(40, 100, 20, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#0ff'; ctx.font = '18px Orbitron'; 
            ctx.fillText('+', 34, 94); ctx.fillText('-', 36, 118);
            ctx.beginPath(); ctx.moveTo(40, 120); ctx.lineTo(40, 150); ctx.stroke();

            // Bottom Wire
            ctx.beginPath(); ctx.moveTo(40, 150); ctx.lineTo(260, 150); ctx.stroke();

            // Top Wire & S1
            ctx.beginPath(); ctx.moveTo(40, 50); ctx.lineTo(100, 50); ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(100, 50, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath();
            if(s1) { ctx.moveTo(100, 50); ctx.lineTo(140, 50); ctx.strokeStyle='#0f0';} // Closed
            else { ctx.moveTo(100, 50); ctx.lineTo(135, 30); ctx.strokeStyle='#f00';} // Open
            ctx.stroke(); ctx.strokeStyle='#0ff'; // Reset color
            ctx.beginPath(); ctx.arc(140, 50, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(140, 50); ctx.lineTo(260, 50); ctx.stroke();
            ctx.fillStyle = '#aaa'; ctx.font = '12px Fira Code'; ctx.fillText('S1', 115, 25);

            // Middle Wire (Short Circuit Path) & S2
            ctx.beginPath(); ctx.moveTo(150, 50); ctx.lineTo(150, 80); ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(150, 80, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath();
            if(s2) { ctx.moveTo(150, 80); ctx.lineTo(150, 120); ctx.strokeStyle='#0f0'; } // Closed
            else { ctx.moveTo(150, 80); ctx.lineTo(175, 115); ctx.strokeStyle='#f00'; } // Open
            ctx.stroke(); ctx.strokeStyle='#0ff'; // Reset color
            ctx.beginPath(); ctx.arc(150, 120, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(150, 120); ctx.lineTo(150, 150); ctx.stroke();
            ctx.fillStyle = '#aaa'; ctx.fillText('S2', 170, 100);

            // Right Wire & Bulb
            ctx.beginPath(); ctx.moveTo(260, 50); ctx.lineTo(260, 80); ctx.stroke();
            ctx.beginPath(); ctx.arc(260, 100, 20, 0, Math.PI*2); ctx.stroke();
            // Cross inside bulb
            ctx.beginPath(); ctx.moveTo(246, 86); ctx.lineTo(274, 114); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(274, 86); ctx.lineTo(246, 114); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(260, 120); ctx.lineTo(260, 150); ctx.stroke();
            ctx.fillStyle = '#ff007f'; ctx.fillText('Bulb', 245, 140);
            
            // Nodes (Connection dots)
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(150, 50, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(150, 150, 4, 0, Math.PI*2); ctx.fill();
        };

        return { 
            type: "Schematic Logic", 
            id: `CanvasCirc_${s1}_${s2}_${Math.random()}`, 
            diagram: canvasHtml, 
            render: renderCanvas,
            options: ['ON', 'OFF'], 
            isLatex: false, 
            layout: 'full' 
        };
    }

    // --- GAME ENGINE ---
    function loadRandomPuzzle() {
        const generators = [generateAdvancedCalculus, generateAdvancedBoolean, generateSchematicCircuit];
        let puzzleData;
        let attempts = 0;
        
        do {
            puzzleData = generators[Math.floor(Math.random() * generators.length)]();
            attempts++;
            if(attempts > 50) { solvedPuzzles.clear(); break; }
        } while (solvedPuzzles.has(puzzleData.id));

        solvedPuzzles.add(puzzleData.id);
        
        document.getElementById('puzzle-type').innerText = puzzleData.type;
        const diagramEl = document.getElementById('diagram');
        
        if (puzzleData.isLatex) {
            katex.render(puzzleData.diagram, diagramEl, { displayMode: true, throwOnError: false });
        } else {
            diagramEl.innerHTML = puzzleData.diagram;
            if(puzzleData.render) puzzleData.render(); // Draw Canvas!
        }
        
        const optContainer = document.getElementById('options');
        optContainer.className = puzzleData.layout === 'full' ? 'options-grid full' : 'options-grid';
        optContainer.innerHTML = '';

        puzzleData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; 
            
            if (puzzleData.isLatex) { katex.render(opt, btn, { throwOnError: false }); } 
            else { btn.innerHTML = opt; }

            btn.onclick = () => handleAnswer(opt);
            optContainer.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        if (!isTimerMode) return; 

        let currentMaxTime = Math.max(baseMinTime, baseMaxTime - (score * 200));
        timeLeft = currentMaxTime;
        const timerBar = document.getElementById('timer-bar');

        timerInterval = setInterval(() => {
            timeLeft -= 50; 
            let percent = (timeLeft / currentMaxTime) * 100;
            timerBar.style.width = percent + '%';

            if(percent > 50) timerBar.style.backgroundColor = '#0f0';
            else if(percent > 20) timerBar.style.backgroundColor = '#ffaa00';
            else timerBar.style.backgroundColor = '#ff0000';

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver("TIME OUT!");
            }
        }, 50);
    }

    function handleAnswer(selected) {
        if (selected === correctAnswer) {
            tg.HapticFeedback.impactOccurred('light');
            score++;
            document.getElementById('score').innerText = score;
            loadRandomPuzzle();
        } else {
            gameOver("WRONG ANSWER!");
        }
    }

    function gameOver(reason) {
        clearInterval(timerInterval);
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('final-score').innerText = `${reason}\nFinal Score: ${score}`;
        document.getElementById('game-over-screen').style.display = 'flex';
    }

    function startGame() {
        tg.HapticFeedback.impactOccurred('medium');
        solvedPuzzles.clear(); 

        if (isTimerMode) {
            let uMax = parseInt(document.getElementById('input-max').value);
            let uMin = parseInt(document.getElementById('input-min').value);
            baseMaxTime = (isNaN(uMax) || uMax < 2) ? 20000 : uMax * 1000;
            baseMinTime = (isNaN(uMin) || uMin < 1) ? 13000 : uMin * 1000;
            if(baseMinTime > baseMaxTime) baseMinTime = baseMaxTime; 

            document.getElementById('timer-ui').style.display = 'block';
            document.getElementById('min-time-display').innerText = `MIN: ${baseMinTime/1000}s`;
        } else {
            document.getElementById('timer-ui').style.display = 'none';
            document.getElementById('min-time-display').innerText = `RELAXED`;
        }

        score = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        
        setTimeout(loadRandomPuzzle, 100);
    }

</script>
</body>
</html>
