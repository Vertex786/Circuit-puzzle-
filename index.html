<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Circuit Panic - Ultimate Engineering</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--tg-theme-bg-color, #050510); color: var(--tg-theme-text-color, #fff);
            font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center;
            height: var(--tg-viewport-height, 100vh); padding: 10px; overflow: hidden;
        }

        .glass-container {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15); width: 100%; max-width: 500px; height: 95%;
            display: flex; flex-direction: column; padding: 15px 20px; position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; margin-bottom: 10px; color: #0ff; text-shadow: 0 0 10px #0ff; }
        .timer-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .timer-bar { height: 100%; width: 100%; background: #0f0; transition: width 0.1s linear, background-color 0.3s; box-shadow: 0 0 10px #0f0; }

        .question-box {
            background: rgba(0, 0, 0, 0.6); border: 1px solid #ff007f; border-radius: 10px; padding: 10px;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 15px; box-shadow: inset 0 0 20px rgba(255, 0, 127, 0.2); text-align: center; overflow: hidden;
            position: relative;
        }

        .puzzle-type { font-size: 0.9rem; color: #ff007f; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .diagram { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        canvas { max-width: 100%; height: auto; background: rgba(255, 255, 255, 0.02); border-radius: 8px; margin-bottom: 10px;}

        .katex { font-size: 1.5rem !important; color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); }
        .katex-display { margin: 0 !important; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .options-grid.full { grid-template-columns: 1fr; }

        button.option-btn {
            background: rgba(0, 255, 255, 0.05); border: 2px solid #0ff; color: #0ff;
            padding: 10px 5px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.1s; font-weight: bold;
            display: flex; justify-content: center; align-items: center; min-height: 60px;
        }
        button.option-btn .katex { font-size: 1.1rem !important; color: #0ff; text-shadow: none; }
        button.option-btn:active { background: rgba(0, 255, 255, 0.4); transform: scale(0.95); }

        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5, 5, 16, 0.95); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; text-align: center; }
        .overlay h1 { color: #f00; text-shadow: 0 0 20px #f00; font-size: 2.2rem; margin-bottom: 10px; }
        .settings-box { background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 10px; padding: 15px; width: 100%; margin-bottom: 20px; }
        .mode-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; background: transparent; border: 1px solid #aaa; color: #aaa; border-radius: 8px; font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: rgba(0, 255, 255, 0.2); border-color: #0ff; color: #0ff; box-shadow: 0 0 10px #0ff; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; color: #ccc; }
        .input-group input { background: rgba(0, 0, 0, 0.5); border: 1px solid #0ff; color: #0ff; padding: 5px 10px; border-radius: 5px; width: 70px; text-align: center; font-family: 'Orbitron', sans-serif; font-weight: bold; }
        .start-btn, .restart-btn { background: #ff007f; color: #fff; border: none; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; border-radius: 10px; box-shadow: 0 0 20px #ff007f; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="glass-container">
    <div id="start-screen" class="overlay">
        <h1 style="color: #0ff; text-shadow: 0 0 20px #0ff;">MIND MATRIX</h1>
        <div class="settings-box">
            <div class="mode-buttons">
                <button id="btn-timer" class="mode-btn active" onclick="setMode('timer')">TIMER</button>
                <button id="btn-relax" class="mode-btn" onclick="setMode('relax')">RELAXED</button>
            </div>
            <div id="timer-config">
                <div class="input-group"><label>Max Time (sec):</label><input type="number" id="input-max" value="25" min="5" max="60"></div>
                <div class="input-group"><label>Min Time (sec):</label><input type="number" id="input-min" value="13" min="2" max="30"></div>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1>SYSTEM FAILURE</h1>
        <h2 id="final-score">Score: 0</h2>
        <button class="restart-btn" onclick="showStartScreen()">REBOOT SYSTEM</button>
    </div>

    <div class="header">
        <span>SCORE: <span id="score">0</span></span>
        <span id="min-time-display" style="font-size:0.9rem; color:#aaa;">MIN: 13s</span>
    </div>

    <div class="timer-container" id="timer-ui"><div id="timer-bar" class="timer-bar"></div></div>
    <div class="question-box"><div id="puzzle-type" class="puzzle-type">LOADING...</div><div id="diagram" class="diagram"></div></div>
    <div id="options" class="options-grid"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); tg.ready();

    let score = 0; let timerInterval; let correctAnswer = null;
    let isTimerMode = true; let baseMaxTime = 25000, baseMinTime = 13000, timeLeft = baseMaxTime;
    let solvedPuzzles = new Set(); 

    function setMode(mode) {
        tg.HapticFeedback.impactOccurred('light');
        isTimerMode = (mode === 'timer');
        document.getElementById('btn-timer').classList.toggle('active', isTimerMode);
        document.getElementById('btn-relax').classList.toggle('active', !isTimerMode);
        document.getElementById('timer-config').style.display = isTimerMode ? 'block' : 'none';
    }

    function showStartScreen() {
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    // --- MASSIVE COMBINATORIAL MATH GENERATOR ---
    function generateInfiniteCalculus() {
        const vars = ['x', 't', 'y', '\\theta', 'z'];
        const v = vars[r(0, vars.length-1)];
        
        // Dynamic formula templates that generate thousands of variations
        const structures = [
            // 1. Definite Integral of Exponential
            () => { let a = r(2,5), b = r(1,3); return { q: `\\int_{0}^{\\ln(${a})} e^{${b}${v}} d${v}`, a: `\\frac{${Math.pow(a, b)} - 1}{${b}}`, w: [`\\frac{${Math.pow(a, b)}}{${b}}`, `${Math.pow(a, b)} - 1`, `\\frac{${a} - 1}{${b}}`] }; },
            
            // 2. L'Hopital's Rule Limit
            () => { let a = r(2,7), b = r(2,7); return { q: `\\lim_{${v} \\to 0} \\frac{\\sin(${a}${v})}{${b}${v}}`, a: `\\frac{${a}}{${b}}`, w: [`0`, `\\infty`, `\\frac{${b}}{${a}}`] }; },
            
            // 3. Limit approaching infinity
            () => { let a = r(2,5), b = r(2,5); return { q: `\\lim_{${v} \\to \\infty} \\frac{${a}${v}^2 - 1}{${b}${v}^2 + ${v}}`, a: `\\frac{${a}}{${b}}`, w: [`0`, `\\infty`, `\\frac{${a}}{${b+1}}`] }; },
            
            // 4. Product Rule with Trig & Exp
            () => { let a = r(2,5); return { q: `\\frac{d}{d${v}} [e^{${a}${v}} \\sin(${v})]`, a: `e^{${a}${v}}(${a}\\sin(${v}) + \\cos(${v}))`, w: [`e^{${a}${v}}\\cos(${v})`, `${a}e^{${a}${v}}\\cos(${v})`, `e^{${a}${v}}(\\sin(${v}) + ${a}\\cos(${v}))`] }; },
            
            // 5. Integral of Logarithm (By parts)
            () => { let a = r(2,5); return { q: `\\int \\ln(${a}${v}) d${v}`, a: `${v}\\ln(${a}${v}) - ${v} + C`, w: [`\\frac{1}{${a}${v}} + C`, `${v}\\ln(${v}) - ${a}${v} + C`, `\\frac{\\ln(${a}${v})}{${v}} + C`] }; },
            
            // 6. Hyperbolic Differentiation
            () => { let a = r(2,6); return { q: `\\frac{d}{d${v}} [\\cosh(${a}${v}^2)]`, a: `${2*a}${v}\\sinh(${a}${v}^2)`, w: [`-${2*a}${v}\\sinh(${a}${v}^2)`, `\\sinh(${a}${v}^2)`, `${a}\\sinh(${a}${v}^2)`] }; },
            
            // 7. Chain rule inside Chain rule
            () => { let a = r(2,4); return { q: `\\frac{d}{d${v}} [\\sin^2(${a}${v})]`, a: `${a}\\sin(${2*a}${v})`, w: [`2\\sin(${a}${v})\\cos(${a}${v})`, `${2*a}\\cos^2(${a}${v})`, `${a}\\cos(${2*a}${v})`] }; },
            
            // 8. Partial Fraction integration style
            () => { let a = r(1,3); return { q: `\\int \\frac{1}{${v}^2 - ${a*a}} d${v}`, a: `\\frac{1}{${2*a}} \\ln\\left|\\frac{${v}-${a}}{${v}+${a}}\\right| + C`, w: [`\\frac{1}{${a}} \\tan^{-1}(\\frac{${v}}{${a}}) + C`, `\\ln|${v}^2 - ${a*a}| + C`, `\\frac{1}{${2*a}} \\ln\\left|\\frac{${v}+${a}}{${v}-${a}}\\right| + C`] }; }
        ];

        let selected = structures[r(0, structures.length - 1)]();
        correctAnswer = selected.a;
        return { type: "Advanced Calculus", id: `Calc_${selected.q}_${Math.random()}`, diagram: selected.q, options: [selected.a, ...selected.w].sort(()=>Math.random()-0.5), isLatex: true, layout: 'grid' };
    }

    // --- COMPLEX CIRCUIT GENERATOR ---
    function generateComplexCircuit() {
        const types = ['wheatstone', 'req'];
        const type = types[r(0, 1)];
        
        let canvasHtml = '';
        let renderCanvas = null;

        if(type === 'wheatstone') {
            // Wheatstone Bridge: Balanced or Unbalanced
            let isBalanced = Math.random() > 0.5;
            let R1 = r(1, 5) * 2; let R2 = r(1, 5) * 2;
            let R3 = isBalanced ? (R1 * 2) : r(1, 5) * 3;
            let R4 = isBalanced ? (R2 * 2) : r(1, 5) * 3 + 1; // Force unbalance
            
            // If balanced, current through Galvanometer (middle) is 0A
            correctAnswer = isBalanced ? "0A" : "I > 0A";
            
            canvasHtml = `<div style="font-family:'Fira Code'; color:#aaa; font-size:0.8rem; margin-bottom:5px;">Current through middle (Ig) = ?</div><canvas id="circuitCanvas" width="300" height="200"></canvas>`;
            
            renderCanvas = () => {
                const ctx = document.getElementById('circuitCanvas').getContext('2d');
                ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2; ctx.fillStyle = '#fff'; ctx.font = '14px Fira Code';
                
                // Draw Diamond Bridge
                ctx.beginPath(); ctx.moveTo(150, 20); ctx.lineTo(80, 100); ctx.lineTo(150, 180); ctx.lineTo(220, 100); ctx.closePath(); ctx.stroke();
                // Draw Middle Wire
                ctx.beginPath(); ctx.moveTo(80, 100); ctx.lineTo(220, 100); ctx.stroke();
                
                // Add Resistor labels (simulated visuals)
                ctx.fillStyle = '#0f0'; ctx.fillText(`${R1}Ω`, 90, 55); ctx.fillText(`${R2}Ω`, 180, 55);
                ctx.fillText(`${R3}Ω`, 90, 160); ctx.fillText(`${R4}Ω`, 180, 160);
                
                // Middle Meter
                ctx.beginPath(); ctx.arc(150, 100, 15, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#ff007f'; ctx.fillText('Ig', 143, 105);
            };
            return { type: "Bridge Circuit", id: `Circ_W_${Math.random()}`, diagram: canvasHtml, render: renderCanvas, options: ['0A', 'I > 0A'], isLatex: false, layout: 'full' };
        } else {
            // Equivalent Resistance
            let R1 = r(1,4)*3; // Multiple of 3
            let R2 = R1 / 3; // Ensures R1||R2 is friendly. e.g. 6 and 2 => 1.5, wait, let's use standard pairs.
            const pairs = [[6,3,2], [12,4,3], [20,5,4], [8,8,4], [10,10,5]]; // [R1, R2, Req_parallel]
            let pair = pairs[r(0, pairs.length-1)];
            let Rseries = r(1, 10);
            
            let totalReq = pair[2] + Rseries;
            correctAnswer = `${totalReq}Ω`;
            let w = [`${pair[0]+pair[1]+Rseries}Ω`, `${Math.abs(totalReq-2)}Ω`, `${totalReq+2}Ω`];

            canvasHtml = `<div style="font-family:'Fira Code'; color:#aaa; font-size:0.8rem; margin-bottom:5px;">Find Equivalent Resistance (Req):</div><canvas id="circuitCanvas" width="300" height="200"></canvas>`;
            
            renderCanvas = () => {
                const ctx = document.getElementById('circuitCanvas').getContext('2d');
                ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2; ctx.fillStyle = '#fff'; ctx.font = '14px Fira Code';
                
                // Input nodes
                ctx.beginPath(); ctx.arc(30, 100, 4, 0, Math.PI*2); ctx.fill(); ctx.fillText('A', 15, 105);
                ctx.beginPath(); ctx.moveTo(30, 100); ctx.lineTo(80, 100); ctx.stroke();
                
                // Series Resistor Box
                ctx.strokeRect(80, 85, 40, 30); ctx.fillStyle = '#0f0'; ctx.fillText(`${Rseries}Ω`, 85, 105);
                
                // Split to parallel
                ctx.beginPath(); ctx.moveTo(120, 100); ctx.lineTo(150, 100); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(150, 50); ctx.lineTo(150, 150); ctx.stroke();
                
                // Top Parallel
                ctx.beginPath(); ctx.moveTo(150, 50); ctx.lineTo(180, 50); ctx.stroke();
                ctx.strokeRect(180, 35, 40, 30); ctx.fillText(`${pair[0]}Ω`, 185, 55);
                ctx.beginPath(); ctx.moveTo(220, 50); ctx.lineTo(250, 50); ctx.stroke();
                
                // Bottom Parallel
                ctx.beginPath(); ctx.moveTo(150, 150); ctx.lineTo(180, 150); ctx.stroke();
                ctx.strokeRect(180, 135, 40, 30); ctx.fillText(`${pair[1]}Ω`, 185, 155);
                ctx.beginPath(); ctx.moveTo(220, 150); ctx.lineTo(250, 150); ctx.stroke();
                
                // Join Parallel
                ctx.beginPath(); ctx.moveTo(250, 50); ctx.lineTo(250, 150); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(250, 100); ctx.lineTo(280, 100); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(280, 100, 4, 0, Math.PI*2); ctx.fill(); ctx.fillText('B', 285, 105);
            };
            return { type: "Network Analysis", id: `Circ_Req_${Math.random()}`, diagram: canvasHtml, render: renderCanvas, options: [correctAnswer, ...w].sort(()=>Math.random()-0.5), isLatex: false, layout: 'grid' };
        }
    }

    function generateHardBaseConversion() {
        let val = r(50, 250);
        let types = ['hex_bin', 'dec_oct', 'bin_hex'];
        let type = types[r(0, types.length - 1)];
        let q, a, wrong = [];
        if(type === 'hex_bin') {
            q = `${val.toString(16).toUpperCase()}_{16} = ?_{2}`;
            a = `${val.toString(2)}_{2}`;
            wrong = [`${(val+1).toString(2)}_{2}`, `${(val^15).toString(2)}_{2}`, `${(val<<1).toString(2).substring(0, val.toString(2).length)}_{2}`];
        } else if (type === 'dec_oct') {
            q = `${val}_{10} = ?_{8}`;
            a = `${val.toString(8)}_{8}`;
            wrong = [`${(val+8).toString(8)}_{8}`, `${(val-8).toString(8)}_{8}`, `${parseInt(val.toString(), 8).toString()}_{8}`];
        } else {
            q = `${val.toString(2)}_{2} = ?_{16}`;
            a = `${val.toString(16).toUpperCase()}_{16}`;
            wrong = [`${(val+1).toString(16).toUpperCase()}_{16}`, `${(val^255).toString(16).toUpperCase()}_{16}`, `${(val-1).toString(16).toUpperCase()}_{16}`];
        }
        correctAnswer = a;
        return { type: "Base Conversion", id: `Base_${val}_${type}_${Math.random()}`, diagram: q, options: [a, ...wrong].slice(0,4).sort(()=>Math.random()-0.5), isLatex: true, layout: 'grid' };
    }

    // --- GAME ENGINE ---
    function loadRandomPuzzle() {
        const generators = [generateInfiniteCalculus, generateComplexCircuit, generateHardBaseConversion];
        let puzzleData = generators[r(0, generators.length - 1)]();
        
        document.getElementById('puzzle-type').innerText = puzzleData.type;
        const diagramEl = document.getElementById('diagram');
        
        if (puzzleData.isLatex) {
            katex.render(puzzleData.diagram, diagramEl, { displayMode: true, throwOnError: false });
        } else {
            diagramEl.innerHTML = puzzleData.diagram;
            if(puzzleData.render) puzzleData.render(); 
        }
        
        const optContainer = document.getElementById('options');
        optContainer.className = puzzleData.layout === 'full' ? 'options-grid full' : 'options-grid';
        optContainer.innerHTML = '';

        puzzleData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; 
            if (puzzleData.isLatex && !opt.includes('Ω')) { katex.render(opt, btn, { throwOnError: false }); } 
            else { btn.innerHTML = opt; }
            btn.onclick = () => handleAnswer(opt);
            optContainer.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        if (!isTimerMode) return; 

        let currentMaxTime = Math.max(baseMinTime, baseMaxTime - (score * 200));
        timeLeft = currentMaxTime;
        const timerBar = document.getElementById('timer-bar');

        timerInterval = setInterval(() => {
            timeLeft -= 50; 
            let percent = (timeLeft / currentMaxTime) * 100;
            timerBar.style.width = percent + '%';
            if(percent > 50) timerBar.style.backgroundColor = '#0f0';
            else if(percent > 20) timerBar.style.backgroundColor = '#ffaa00';
            else timerBar.style.backgroundColor = '#ff0000';
            if (timeLeft <= 0) { clearInterval(timerInterval); gameOver("TIME OUT!"); }
        }, 50);
    }

    function handleAnswer(selected) {
        if (selected === correctAnswer) {
            tg.HapticFeedback.impactOccurred('light');
            score++;
            document.getElementById('score').innerText = score;
            loadRandomPuzzle();
        } else {
            gameOver("WRONG ANSWER!");
        }
    }

    function gameOver(reason) {
        clearInterval(timerInterval);
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('final-score').innerText = `${reason}\nFinal Score: ${score}`;
        document.getElementById('game-over-screen').style.display = 'flex';
    }

    function startGame() {
        tg.HapticFeedback.impactOccurred('medium');

        if (isTimerMode) {
            let uMax = parseInt(document.getElementById('input-max').value); let uMin = parseInt(document.getElementById('input-min').value);
            baseMaxTime = (isNaN(uMax) || uMax < 2) ? 25000 : uMax * 1000; baseMinTime = (isNaN(uMin) || uMin < 1) ? 13000 : uMin * 1000;
            if(baseMinTime > baseMaxTime) baseMinTime = baseMaxTime; 
            document.getElementById('timer-ui').style.display = 'block'; document.getElementById('min-time-display').innerText = `MIN: ${baseMinTime/1000}s`;
        } else {
            document.getElementById('timer-ui').style.display = 'none'; document.getElementById('min-time-display').innerText = `RELAXED`;
        }

        score = 0; document.getElementById('score').innerText = score;
        document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-over-screen').style.display = 'none';
        
        setTimeout(loadRandomPuzzle, 100);
    }
</script>
</body>
</html>
